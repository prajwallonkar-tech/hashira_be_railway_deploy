                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                statusCode: 401
                message: API key required
        '403':
          description: >
            API key lacks `verification:read` permission, or organisation is
            suspended / not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                statusCode: 403
                code: INSUFFICIENT_PERMISSIONS
                message: API key does not have required permission
        '404':
          description: Event not found for this org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                statusCode: 404
                message: Event not found
        '422':
          description: Event exists but has not yet been anchored on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                statusCode: 422
                code: UNPROCESSABLE
                message: Event is not yet anchored on-chain
                details:
                  - field: status
                    value: anchoring
  /health/queue:
    servers:
      - url: /
        description: Health endpoints (not versioned — no /v1 prefix)
    get:
      tags:
        - Health
      summary: Queue depth and worker status
      description: >
        Returns current BullMQ anchor queue job counts. Use during a demo to
        observe jobs moving from `waiting → active → completed` in real time as
        events are submitted and anchored. No authentication required.
      responses:
        '200':
          description: Queue is available — job counts returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  queue:
                    type: object
                    properties:
                      waiting:
                        type: integer
                        description: Jobs queued but not yet picked up by a worker
                        example: 0
                      active:
                        type: integer
                        description: Jobs currently being processed (blockchain tx in flight)
                        example: 1
                      completed:
                        type: integer
                        description: Jobs that finished successfully
                        example: 3
                      failed:
                        type: integer
                        description: Jobs that exhausted all retries
                        example: 0
                      delayed:
                        type: integer
                        description: Jobs waiting for a retry back-off delay
                        example: 0
              examples:
                idle:
                  summary: Queue idle — no jobs in flight
                  value:
                    status: ok
                    queue:
                      waiting: 0
                      active: 0
                      completed: 3
                      failed: 0
                      delayed: 0
                anchoring_in_progress:
                  summary: One job actively anchoring to blockchain
                  value:
                    status: ok
                    queue:
                      waiting: 0
                      active: 1
                      completed: 3
                      failed: 0
                      delayed: 0
                retry_delayed:
                  summary: Job in back-off after a transient RPC failure
                  value:
                    status: ok
                    queue:
                      waiting: 0
                      active: 0
                      completed: 3
                      failed: 0
                      delayed: 1
        '503':
          description: Queue not yet initialised (server still starting up)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unavailable
              example:
                status: unavailable
